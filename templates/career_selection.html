<!DOCTYPE html>
<html>
    <head>
        <title>Talent Trail</title>
    </head>

    <body>
        <h1>Select a Career to Explore:</h1>

        <form action="careers/survey" method="post">
            <label for="career">Select a Career:</label>
            <select name="career" id="career" required>
                <option value="" disabled selected>Select a Career...</option>
                {% for code, title in careers %}
                    <option value="{{code}}">{{title}}</option>
                {% endfor %}
            </select>

            <button type="submit">Continue</button>
        </form>
    </body>
</html>
